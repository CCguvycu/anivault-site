<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime — AniVault</title>
  <link rel="icon" href="logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">
    <svg viewBox="0 0 32 32" fill="none"><polygon points="16,2 30,9 30,23 16,30 2,23 2,9" fill="url(#lg)"/><polygon points="12,11 22,16 12,21" fill="white" opacity=".9"/><defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#ec4899"/></linearGradient></defs></svg>
    AniVault
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
    <a href="browse.html" class="nav-link">Browse</a>
    <a href="watchlist.html" class="nav-link">My List</a>
  </div>
  <div class="nav-search-wrap">
    <div class="nav-search">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="globalSearch" type="text" placeholder="Search anime…" autocomplete="off">
    </div>
    <div class="search-drop" id="searchDrop"></div>
  </div>
</nav>

<div class="detail-page">
  <div class="detail-banner" id="banner">
    <img id="bannerImg" src="" alt="" style="display:none">
  </div>

  <div class="detail-main" id="detailMain">
    <!-- Poster column -->
    <div class="detail-poster">
      <img id="posterImg" src="" alt="">
      <button class="detail-watch-btn" id="watchBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Watch Now
      </button>
      <button class="detail-wl-btn" id="wlBtn">♡ Add to List</button>
      <div class="detail-studios" id="studioLabel"></div>
    </div>

    <!-- Info column -->
    <div class="detail-info">
      <h1 id="titleEl">Loading…</h1>
      <div class="detail-native" id="nativeEl"></div>
      <div class="detail-stats-row" id="statsRow"></div>
      <div class="detail-genres" id="genresEl"></div>

      <p class="detail-desc clamped" id="descEl"></p>
      <button class="toggle-desc-btn" id="toggleDescBtn" onclick="toggleDesc()">Show more ↓</button>

      <!-- Episodes -->
      <div id="epSection" style="display:none;margin-bottom:1.5rem">
        <div class="sec-title">Episodes</div>
        <div class="ep-grid-detail" id="epGrid"></div>
      </div>

      <!-- Characters -->
      <div id="charSection" style="display:none;margin-bottom:1.5rem">
        <div class="sec-title">Characters</div>
        <div class="char-scroll" id="charRow"></div>
      </div>

      <!-- Related -->
      <div id="relSection" style="display:none;margin-bottom:1.5rem">
        <div class="sec-title">Related</div>
        <div class="rec-scroll" id="relRow"></div>
      </div>

      <!-- Recommended -->
      <div id="recSection" style="display:none">
        <div class="sec-title">You Might Also Like</div>
        <div class="rec-scroll" id="recRow"></div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
let anime = null;
const id  = parseInt(P.get('id'));

function toggleDesc() {
  const el  = document.getElementById('descEl');
  const btn = document.getElementById('toggleDescBtn');
  el.classList.toggle('clamped');
  btn.textContent = el.classList.contains('clamped') ? 'Show more ↓' : 'Show less ↑';
}

function buildEps(total, aid) {
  if (!total) return;
  document.getElementById('epSection').style.display = '';
  const grid = document.getElementById('epGrid');
  const prog = S.progress(aid);
  for (let i = 1; i <= total; i++) {
    const btn = document.createElement('button');
    const isDone    = prog.eps.includes(i);
    const isResume  = prog.last === i;
    btn.className = 'ep-num-btn' + (isResume ? ' resume' : isDone ? ' done' : '');
    btn.textContent = i;
    btn.onclick = () => P.go('watch.html', { id: aid, ep: i });
    grid.append(btn);
  }
}

function buildChars(chars) {
  if (!chars?.nodes?.length) return;
  document.getElementById('charSection').style.display = '';
  const row = document.getElementById('charRow');
  chars.nodes.forEach(c => {
    const d = document.createElement('div'); d.className = 'char-card';
    d.innerHTML = `<img src="${c.image.large}" alt="" loading="lazy"><div class="char-name">${c.name.full}</div>`;
    row.append(d);
  });
}

function buildRelated(relations) {
  const edges = (relations?.edges||[]).filter(e => ['SEQUEL','PREQUEL','SIDE_STORY','PARENT'].includes(e.relationType) && e.node.type==='ANIME');
  if (!edges.length) return;
  document.getElementById('relSection').style.display = '';
  const row = document.getElementById('relRow');
  edges.forEach(e => {
    const n = e.node;
    const d = document.createElement('div'); d.className = 'rec-card';
    d.innerHTML = `<img src="${n.coverImage.large}" alt="" loading="lazy"><div class="rec-card-title">${n.title.romaji}</div>`;
    d.onclick = () => P.go('anime.html', { id: n.id });
    row.append(d);
  });
}

function buildRecs(recs) {
  const nodes = (recs?.nodes||[]).filter(n => n.mediaRecommendation);
  if (!nodes.length) return;
  document.getElementById('recSection').style.display = '';
  const row = document.getElementById('recRow');
  nodes.forEach(n => {
    const m = n.mediaRecommendation;
    const d = document.createElement('div'); d.className = 'rec-card';
    d.innerHTML = `<img src="${m.coverImage.large}" alt="" loading="lazy"><div class="rec-card-title">${m.title.romaji}</div>`;
    d.onclick = () => P.go('anime.html', { id: m.id });
    row.append(d);
  });
}

async function load() {
  if (!id) { document.getElementById('titleEl').textContent = 'No anime ID provided.'; return; }
  try {
    const data = await gql(Q.detail, { id });
    anime = data.Media;
    const title = anime.title.english || anime.title.romaji;
    document.title = `${title} — AniVault`;

    // Banner
    if (anime.bannerImage) {
      const img = document.getElementById('bannerImg');
      img.src = anime.bannerImage; img.style.display = '';
    } else {
      document.getElementById('banner').style.background = `linear-gradient(135deg, ${anime.coverImage.color||'#7c3aed'}44 0%, var(--s1) 100%)`;
    }

    // Poster
    const poster = document.getElementById('posterImg');
    poster.src = anime.coverImage.extraLarge || anime.coverImage.large;
    poster.alt = title;

    // Watch button
    const prog = S.progress(id);
    const ep   = prog.last || 1;
    const watchBtn = document.getElementById('watchBtn');
    watchBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> ${prog.last ? `Resume EP ${ep}` : 'Watch Now'}`;
    watchBtn.onclick = () => P.go('watch.html', { id, ep });

    // Watchlist button
    const wlBtn = document.getElementById('wlBtn');
    wlBtn.classList.toggle('in-wl', S.inWl(id));
    wlBtn.textContent = S.inWl(id) ? '♥ In My List' : '♡ Add to List';
    wlBtn.onclick = () => {
      S.toggleWl(anime);
      wlBtn.classList.toggle('in-wl', S.inWl(id));
      wlBtn.textContent = S.inWl(id) ? '♥ In My List' : '♡ Add to List';
      toast(S.inWl(id) ? 'Added to your list' : 'Removed from list', S.inWl(id) ? 'success' : 'info');
    };

    // Studio
    const studios = (anime.studios?.nodes||[]).map(s=>s.name).join(', ');
    if (studios) document.getElementById('studioLabel').textContent = studios;

    // Title
    document.getElementById('titleEl').textContent = title;
    if (anime.title.native) document.getElementById('nativeEl').textContent = anime.title.native;

    // Stats
    const score = anime.averageScore ? (anime.averageScore/10).toFixed(1) : null;
    const statsRow = document.getElementById('statsRow');
    [
      score ? { label: `★ ${score}`, cls: 'score' } : null,
      { label: anime.episodes ? `${anime.episodes} Episodes` : 'Ongoing' },
      { label: [anime.season, anime.seasonYear].filter(Boolean).join(' ') || 'Unknown Year' },
      { label: anime.format?.replace('_',' ') || 'Anime' },
      anime.status==='RELEASING' ? { label: '● Airing', cls: 'airing' } : { label: anime.status?.replace('_',' ') || '' },
      { label: `${(anime.popularity||0).toLocaleString()} fans` },
    ].filter(Boolean).forEach(s => {
      const chip = document.createElement('div');
      chip.className = 'stat-chip' + (s.cls ? ' '+s.cls : '');
      chip.textContent = s.label;
      statsRow.append(chip);
    });

    // Genres
    const genresEl = document.getElementById('genresEl');
    (anime.genres||[]).forEach(g => {
      const pill = document.createElement('a');
      pill.className = 'genre-pill';
      pill.href = `browse.html?genre=${encodeURIComponent(g)}`;
      pill.textContent = g;
      genresEl.append(pill);
    });

    // Description
    const desc = (anime.description||'No description available.').replace(/<[^>]+>/g,'');
    document.getElementById('descEl').textContent = desc;
    if (desc.length < 280) document.getElementById('toggleDescBtn').style.display = 'none';

    // Episodes, chars, related, recs
    const eps = anime.episodes || (anime.nextAiringEpisode?.episode ? anime.nextAiringEpisode.episode - 1 : null);
    buildEps(eps, id);
    buildChars(anime.characters);
    buildRelated(anime.relations);
    buildRecs(anime.recommendations);

  } catch(e) {
    document.getElementById('titleEl').textContent = 'Failed to load.';
    console.error(e);
  }
}

load();
</script>
</body>
</html>
