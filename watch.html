<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watching — AniVault</title>
  <link rel="icon" href="logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">⬡ AniVault</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="browse.html">Browse</a>
    <a href="watchlist.html">Watchlist</a>
  </div>
  <div class="nav-search">
    <span>🔍</span>
    <input type="text" id="navSearch" placeholder="Search anime…" autocomplete="off">
  </div>
</nav>

<div class="watch-page">
  <!-- Player column -->
  <div class="watch-main">
    <div class="watch-title" id="watchTitle">
      Loading… <span id="watchEpLabel"></span>
    </div>

    <div class="player-wrap">
      <iframe id="player" allowfullscreen allow="autoplay; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

    <!-- Controls -->
    <div class="ctrl-bar">
      <button class="pill" id="prevBtn" disabled onclick="changeEp(-1)">← Prev</button>
      <button class="pill" id="nextBtn" disabled onclick="changeEp(1)">Next →</button>
      <button class="pill" id="retryBtn" onclick="loadEp(curEp)">↺ Retry</button>
      <button class="pill" id="detailBtn">ℹ Details</button>
      <button class="pill fs-btn" onclick="toggleFs()">⛶ Fullscreen</button>
    </div>

    <!-- Source switcher -->
    <div class="src-bar">
      <span>Source:</span>
      <div id="srcRow"></div>
    </div>

    <!-- Hint -->
    <p class="watch-hint">
      ⟐ If video doesn't load, try a different source above or hit ↺ Retry.
      AutoEmbed is the most reliable. VidSrc/AniWatch may be geo-restricted.
    </p>
  </div>

  <!-- Episode sidebar -->
  <div class="ep-sidebar">
    <div class="ep-sidebar-head">
      <span>Episodes</span>
      <span id="epSideCount">—</span>
    </div>
    <div class="ep-list" id="epList">
      <div style="padding:2rem;text-align:center;color:var(--dim);font-size:.85rem">Loading…</div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
const animeId = parseInt(P.get('id'));
let curEp     = parseInt(P.get('ep')) || 1;
let curSrc    = S.src();
let totalEps  = 0;
let anime     = null;

document.getElementById('navSearch').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.value.trim())
    P.go('browse.html', { q: e.target.value.trim() });
});

// ── Build source buttons ─────────────────────
function buildSrcs() {
  const row = document.getElementById('srcRow');
  SOURCES.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'src-btn' + (i === curSrc ? ' active' : '');
    btn.style.borderColor = i === curSrc ? s.color : '';
    btn.style.color = i === curSrc ? s.color : '';
    btn.textContent = s.name;
    btn.onclick = () => { curSrc = i; S.setSrc(i); buildSrcs(); loadEp(curEp); };
    row.append(btn);
  });
}

// ── Load episode into iframe ─────────────────
function loadEp(ep) {
  curEp = ep;
  const src = SOURCES[curSrc];
  document.getElementById('player').src = src.url(animeId, ep);

  // Update URL without reload
  const u = new URL(location.href);
  u.searchParams.set('ep', ep);
  history.replaceState(null, '', u.toString());

  // Progress
  if (anime) {
    S.pushHistory(anime, ep);
    S.saveProgress(animeId, ep);
  }

  // Controls
  document.getElementById('prevBtn').disabled = ep <= 1;
  document.getElementById('nextBtn').disabled = totalEps ? ep >= totalEps : false;
  document.getElementById('watchEpLabel').textContent = `— Episode ${ep}`;

  // Sidebar highlight
  document.querySelectorAll('.ep-item').forEach(el => {
    const n = parseInt(el.dataset.ep);
    el.classList.toggle('active', n === ep);
    el.classList.toggle('watched', S.watched(animeId, n));
    el.querySelector('.ep-num').style.color = n === ep ? 'var(--p3)' : S.watched(animeId, n) ? 'var(--green)' : '';
  });

  // Scroll sidebar to active ep
  const activeEl = document.querySelector('.ep-item.active');
  if (activeEl) activeEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
}

function changeEp(delta) {
  const next = curEp + delta;
  if (next < 1 || (totalEps && next > totalEps)) return;
  loadEp(next);
}

function toggleFs() {
  const el = document.querySelector('.player-wrap');
  if (!document.fullscreenElement) el.requestFullscreen();
  else document.exitFullscreen();
}

// ── Build episode sidebar ────────────────────
function buildSidebar(eps) {
  totalEps = eps;
  document.getElementById('epSideCount').textContent = eps ? `${eps} episodes` : 'Ongoing';
  document.getElementById('nextBtn').disabled = eps ? curEp >= eps : false;

  const list = document.getElementById('epList');
  list.innerHTML = '';
  const count = eps || 100;
  for (let i = 1; i <= count; i++) {
    const item = document.createElement('div');
    item.className = 'ep-item' + (i === curEp ? ' active' : '') + (S.watched(animeId, i) ? ' watched' : '');
    item.dataset.ep = i;
    item.innerHTML = `
      <div class="ep-num" style="${i === curEp ? 'color:var(--p3)' : S.watched(animeId,i) ? 'color:var(--green)' : ''}">EP</div>
      <div class="ep-label">Episode ${i}</div>
      <div class="ep-dot"></div>`;
    item.onclick = () => loadEp(i);
    list.append(item);
  }
}

// ── Boot ─────────────────────────────────────
async function init() {
  if (!animeId) {
    document.getElementById('watchTitle').textContent = 'No anime ID. Go back and pick one.';
    return;
  }

  buildSrcs();
  document.getElementById('detailBtn').onclick = () => P.go('anime.html', { id: animeId });

  try {
    const data = await gql(Q.detail, { id: animeId });
    anime = data.Media;
    const title = anime.title.english || anime.title.romaji;
    document.title = `EP ${curEp} — ${title} — AniVault`;
    document.getElementById('watchTitle').textContent = title;

    const eps = anime.episodes || (anime.nextAiringEpisode?.episode ? anime.nextAiringEpisode.episode - 1 : 0);
    buildSidebar(eps);
    loadEp(curEp);
  } catch(e) {
    document.getElementById('watchTitle').textContent = 'Error loading anime info.';
    loadEp(curEp);
    console.error(e);
  }
}

init();
</script>
</body>
</html>
