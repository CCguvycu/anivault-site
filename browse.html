<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse — AniVault</title>
  <link rel="icon" href="logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">
    <svg viewBox="0 0 32 32" fill="none"><polygon points="16,2 30,9 30,23 16,30 2,23 2,9" fill="url(#lg)"/><polygon points="12,11 22,16 12,21" fill="white" opacity=".9"/><defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#ec4899"/></linearGradient></defs></svg>
    AniVault
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
    <a href="browse.html" class="nav-link">Browse</a>
    <a href="browse.html?sort=TRENDING_DESC" class="nav-link">Trending</a>
    <a href="browse.html?sort=SCORE_DESC" class="nav-link">Top Rated</a>
    <a href="watchlist.html" class="nav-link">My List</a>
  </div>
  <div class="nav-search-wrap">
    <div class="nav-search">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="globalSearch" type="text" placeholder="Search anime…" autocomplete="off">
    </div>
    <div class="search-drop" id="searchDrop"></div>
  </div>
</nav>

<div class="grid-page">
  <div class="page-hdr">
    <h1 id="pageTitle">Browse All Anime</h1>
    <p id="pageSubtitle">3,266 anime in the database · search, filter, stream</p>
  </div>

  <!-- Genre chips -->
  <div id="genreChips" style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem"></div>

  <!-- Filter strip -->
  <div class="filter-strip">
    <input type="text" class="filter-search" id="searchQ" placeholder="Search title…">

    <select id="fYear">
      <option value="">Any Year</option>
    </select>

    <select id="fFmt">
      <option value="">All Formats</option>
      <option value="TV">TV</option>
      <option value="MOVIE">Movie</option>
      <option value="OVA">OVA</option>
      <option value="ONA">ONA</option>
      <option value="SPECIAL">Special</option>
    </select>

    <select id="fStatus">
      <option value="">Any Status</option>
      <option value="RELEASING">Airing</option>
      <option value="FINISHED">Finished</option>
      <option value="NOT_YET_RELEASED">Upcoming</option>
    </select>

    <select id="fSort">
      <option value="POPULARITY_DESC">Most Popular</option>
      <option value="TRENDING_DESC">Trending</option>
      <option value="SCORE_DESC">Top Rated</option>
      <option value="START_DATE_DESC">Newest First</option>
      <option value="TITLE_ROMAJI">A → Z</option>
      <option value="UPDATED_AT_DESC">Recently Updated</option>
    </select>

    <div class="filter-sep"></div>
    <span class="result-count" id="resultCount"></span>
  </div>

  <!-- Mode toggle -->
  <div class="mode-bar">
    <button class="mode-btn active" id="btnDb"  onclick="setMode('db')">📦 Database (3,266)</button>
    <button class="mode-btn"        id="btnLive" onclick="setMode('live')">🌐 AniList Live</button>
  </div>

  <div class="loading-center" id="loadingCenter" style="display:none">
    <div class="spinner"></div>
  </div>

  <div class="anime-grid" id="grid"></div>

  <div class="load-more-wrap" id="moreWrap" style="display:none">
    <button class="btn-load-more" id="moreBtn" onclick="loadMore()">Load More</button>
  </div>
</div>

<script src="app.js"></script>
<script>
const GENRES = ['Action','Adventure','Comedy','Drama','Fantasy','Horror','Mecha','Music','Mystery','Psychological','Romance','Sci-Fi','Slice of Life','Sports','Supernatural','Thriller'];
let mode    = 'db';
let dbIds   = [], dbPage = 0;
let livePage = 1, liveHasMore = false;
let activeGenre = '';
let debounceTimer;

// ── Genre chips ────────────────────────────────
function buildChips() {
  const wrap = document.getElementById('genreChips');
  GENRES.forEach(g => {
    const chip = document.createElement('button');
    chip.className = 'filter-chip' + (g === activeGenre ? ' active' : '');
    chip.textContent = g;
    chip.onclick = () => {
      activeGenre = activeGenre === g ? '' : g;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      if (activeGenre) chip.classList.add('active');
      resetFetch();
    };
    wrap.append(chip);
  });
}

// ── Year options ───────────────────────────────
(function() {
  const sel = document.getElementById('fYear');
  for (let y = new Date().getFullYear(); y >= 1960; y--) {
    const o = document.createElement('option'); o.value = o.textContent = y; sel.append(o);
  }
})();

// ── Pre-fill from URL params ───────────────────
(function() {
  const q = P.get('q'), g = P.get('genre'), s = P.get('sort');
  if (q) { document.getElementById('searchQ').value = q; document.getElementById('pageTitle').textContent = `Search: "${q}"`; }
  if (g) { activeGenre = g; document.getElementById('pageTitle').textContent = g + ' Anime'; }
  if (s) document.getElementById('fSort').value = s;
})();

// ── Live search debounce ───────────────────────
document.getElementById('searchQ').addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(resetFetch, 550);
});
['fYear','fFmt','fStatus','fSort'].forEach(id => {
  document.getElementById(id).addEventListener('change', resetFetch);
});

// ── Mode ───────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('btnDb').classList.toggle('active', m === 'db');
  document.getElementById('btnLive').classList.toggle('active', m === 'live');
  resetFetch();
}

// ── Reset + fetch ──────────────────────────────
function resetFetch() {
  document.getElementById('grid').innerHTML = '';
  dbPage = 0; livePage = 1; liveHasMore = false;
  document.getElementById('moreWrap').style.display = 'none';
  const q = document.getElementById('searchQ').value.trim();
  if (mode === 'db' && !q && !activeGenre) fetchDb();
  else fetchLive();
}

// ── DB mode ────────────────────────────────────
async function loadDbIds() {
  if (dbIds.length) return;
  const r = await fetch(DB_URL);
  const j = await r.json();
  dbIds = j.ids || [];
}

async function fetchDb() {
  showLoading(true);
  await loadDbIds();
  const batch = dbIds.slice(dbPage * 50, (dbPage + 1) * 50);
  if (!batch.length) { showLoading(false); return; }
  try {
    const d     = await gql(Q.byIds, { ids: batch, page: 1 });
    const grid  = document.getElementById('grid');
    d.Page.media.forEach(a => grid.append(buildCard(a)));
    dbPage++;
    const shown = grid.children.length;
    document.getElementById('resultCount').textContent = `${shown} of ${dbIds.length} anime`;
    document.getElementById('moreWrap').style.display = dbPage * 50 < dbIds.length ? 'flex' : 'none';
  } catch(e) { console.error(e); }
  showLoading(false);
}

// ── Live mode ──────────────────────────────────
async function fetchLive() {
  const q      = document.getElementById('searchQ').value.trim() || null;
  const year   = parseInt(document.getElementById('fYear').value) || null;
  const fmt    = document.getElementById('fFmt').value || null;
  const status = document.getElementById('fStatus').value || null;
  const sort   = [document.getElementById('fSort').value || 'POPULARITY_DESC'];
  const genres = activeGenre ? [activeGenre] : null;
  const query  = q ? Q.search : Q.browse;
  const vars   = { p: livePage, genres, year, fmt, status, sort, s: q };

  showLoading(true);
  try {
    const d     = await gql(query, vars);
    const pg    = d.Page;
    const grid  = document.getElementById('grid');
    pg.media.forEach(a => grid.append(buildCard(a)));
    liveHasMore = pg.pageInfo.hasNextPage;
    livePage++;
    document.getElementById('resultCount').textContent = `${grid.children.length}${liveHasMore?'+':''} results`;
    document.getElementById('moreWrap').style.display = liveHasMore ? 'flex' : 'none';
  } catch(e) { console.error(e); }
  showLoading(false);
}

function loadMore() {
  if (mode === 'db') fetchDb(); else fetchLive();
}
function showLoading(on) {
  document.getElementById('loadingCenter').style.display = on ? 'flex' : 'none';
}

// ── Boot ───────────────────────────────────────
buildChips();
skeletons(28, document.getElementById('grid'));
loadDbIds().then(() => {
  document.getElementById('grid').innerHTML = '';
  resetFetch();
});
</script>
</body>
</html>
