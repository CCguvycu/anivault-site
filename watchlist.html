<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My List — AniVault</title>
  <link rel="icon" href="logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">
    <svg viewBox="0 0 32 32" fill="none"><polygon points="16,2 30,9 30,23 16,30 2,23 2,9" fill="url(#lg)"/><polygon points="12,11 22,16 12,21" fill="white" opacity=".9"/><defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#ec4899"/></linearGradient></defs></svg>
    AniVault
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
    <a href="browse.html" class="nav-link">Browse</a>
    <a href="watchlist.html" class="nav-link">My List</a>
  </div>
  <div class="nav-search-wrap">
    <div class="nav-search">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="globalSearch" type="text" placeholder="Search anime…" autocomplete="off">
    </div>
    <div class="search-drop" id="searchDrop"></div>
  </div>
</nav>

<div class="grid-page">
  <div class="page-hdr">
    <h1>My List</h1>
    <p id="wlMeta">Your watchlist and viewing history</p>
  </div>

  <!-- Continue Watching -->
  <div id="contSec">
    <div class="row-head" style="margin-bottom:1rem">
      <h2 class="row-title">Continue Watching</h2>
    </div>
    <div class="wl-grid" id="histGrid"></div>
  </div>

  <!-- Watchlist -->
  <div style="margin-top:2.5rem" id="wlSec">
    <div class="row-head" style="margin-bottom:1rem">
      <h2 class="row-title">Saved Anime</h2>
    </div>
    <div class="wl-grid" id="wlGrid"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
function histCard(h) {
  const d = document.createElement('div');
  d.className = 'card';
  d.style.setProperty('--accent', h.color || '#7c3aed');
  d.innerHTML = `
    <div class="card-media">
      <img class="card-img" src="${h.img}" alt="${h.title}" loading="lazy">
      <div class="card-resume-badge">EP ${h.ep}</div>
      <div class="card-hover">
        <div class="card-hover-inner">
          <button class="card-play-btn" onclick="event.stopPropagation();P.go('watch.html',{id:${h.id},ep:${h.ep}})">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
            Resume EP ${h.ep}
          </button>
        </div>
      </div>
      <div class="card-bottom-grad">
        <div class="card-title-text">${h.title}</div>
      </div>
    </div>
    <div class="card-tags"><span>${new Date(h.ts).toLocaleDateString()}</span></div>`;
  d.onclick = () => P.go('watch.html', { id: h.id, ep: h.ep });
  return d;
}

function wlCard(w) {
  const d = document.createElement('div');
  d.className = 'card';
  d.innerHTML = `
    <div class="card-media">
      <img class="card-img" src="${w.img}" alt="${w.title}" loading="lazy">
      <div class="card-hover">
        <div class="card-hover-inner">
          <button class="card-play-btn" onclick="event.stopPropagation();P.go('watch.html',{id:${w.id},ep:1})">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
            Watch
          </button>
          <button class="card-wl-btn in-wl" onclick="event.stopPropagation();removeFromList(${w.id},this)">♥ Remove</button>
        </div>
      </div>
      <div class="card-bottom-grad">
        <div class="card-title-text">${w.title}</div>
      </div>
    </div>
    <div class="card-tags"><span style="color:var(--pink)">♥ Saved</span></div>`;
  d.onclick = () => P.go('anime.html', { id: w.id });
  return d;
}

function removeFromList(id, btn) {
  S.removeFromWl(id);
  btn.closest('.card').remove();
  updateMeta();
  toast('Removed from list', 'info');
}

function updateMeta() {
  document.getElementById('wlMeta').textContent = `${S.watchlist().length} saved · ${S.history().length} in history`;
}

function render() {
  const hist = S.history();
  const wl   = S.watchlist();

  if (!hist.length) {
    document.getElementById('contSec').innerHTML = '';
  } else {
    hist.forEach(h => document.getElementById('histGrid').append(histCard(h)));
  }

  if (!wl.length) {
    document.getElementById('wlSec').innerHTML = `
      <div class="empty-state">
        <div class="icon">♡</div>
        <p style="font-size:1.1rem;font-weight:700;color:var(--t2)">Your list is empty</p>
        <p>Save anime to watch later — click ♡ on any card.</p>
        <p style="margin-top:.75rem"><a href="browse.html">Browse 3,000+ anime →</a></p>
      </div>`;
  } else {
    wl.forEach(w => document.getElementById('wlGrid').append(wlCard(w)));
  }
  updateMeta();
}

render();
</script>
</body>
</html>
